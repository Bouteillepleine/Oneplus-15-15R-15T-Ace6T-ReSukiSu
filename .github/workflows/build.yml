name: OnePlus 15 / 15T / 15R / Ace 6T ReSukiSU

on:
  workflow_dispatch:
    inputs:
      DEVICE:
        type: choice
        description: "Target device"
        required: true
        default: "OnePlus 15"
        options:
          - "OnePlus 15"
          - "OnePlus 15T"
          - "OnePlus 15R"
          - "OnePlus Ace 6T"

      MANAGER_SOURCE:
        type: choice
        description: "Kernel manager APK variant"
        required: true
        default: MD3
        options:
          - MD3
          - MD3_SPOOF

      KSU_SETUP_BRANCH:
        type: choice
        description: "ReSukiSU setup.sh branch"
        required: true
        default: main
        options:
          - main
          - dev

      KSU_META:
        type: string
        description: "ReSukiSU version: branch/tag/hash. Example: main/Ultra/ or main/Ultra/abcdef1"
        required: false
        default: "main/⚡Ultra⚡/"

      SUSFS_META:
        type: string
        description: "SUSFS version: empty = latest, number = rollback commits, hash = exact commit, -1 = disable"
        required: false
        default: ""

      SUSFS_CI:
        type: choice
        description: "Include SUSFS module ZIP from"
        required: true
        default: CI
        options:
          - CI
          - Release
          - N/A

      SUSFS_DEV:
        type: boolean
        description: "Use SUSFS development branch? Less stable."
        required: true
        default: false

      KPM:
        type: choice
        description: "Kernel module implementation mode"
        required: true
        default: N/A
        options:
          - KPM
          - KPN
          - N/A

      BUILD_TIME:
        type: string
        description: "Kernel build timestamp. F = current UTC time, -1 = do not modify"
        required: false
        default: "F"

      SUFFIX:
        type: string
        description: "Kernel suffix: empty = random, -1 = disable, or enter custom suffix"
        required: false
        default: "5-gb2a876903b49-ab14541642-4k"

      SUBLEVEL:
        type: string
        description: "Optional kernel SUBLEVEL spoof. Leave empty for default."
        required: false
        default: ""

      BASEBAND_GUARD:
        type: boolean
        description: "Enable Baseband Guard / critical partition write protection"
        required: true
        default: false

      NETFILTER:
        type: boolean
        description: "Enable advanced network filtering options"
        required: true
        default: false

      BBR_ECN:
        type: boolean
        description: "Enable BBR congestion control and ECN"
        required: true
        default: true

      UNICODE_BYPASS:
        type: boolean
        description: "Apply Unicode invisible-codepoint compatibility patch"
        required: true
        default: false

      XUS_FIX:
        type: boolean
        description: "Apply No_5uS patch"
        required: false
        default: false

      CREATE_RELEASE:
        type: boolean
        description: "Create GitHub release after successful build"
        required: true
        default: true

      SKIP_DISK_CLEANUP:
        type: boolean
        description: "Skip disk cleanup before build"
        required: true
        default: false

      DISABLE_CCACHE:
        type: boolean
        description: "Disable ccache"
        required: true
        default: false

permissions:
  contents: write
  actions: read

concurrency:
  group: resukisu-${{ github.ref }}-${{ inputs.DEVICE }}
  cancel-in-progress: true

jobs:
  build:
    name: >-
      ${{ inputs.DEVICE }}
      ${{ inputs.BASEBAND_GUARD && '[BBG]' || '' }}
      ${{ inputs.NETFILTER && '[NETFILTER]' || '' }}
      ${{ inputs.BBR_ECN && '[BBR+ECN]' || '' }}
      ${{ inputs.SUSFS_META != '-1' && '[SUSFS]' || '' }}
      ${{ inputs.KPM == 'KPM' && '[KPM]' || inputs.KPM == 'KPN' && '[KPN]' || '' }}

    runs-on: ubuntu-latest
    timeout-minutes: 150

    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 15G
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_SLOPPINESS: "include_file_mtime,include_file_ctime,time_macros,file_macro,system_headers"
      CCACHE_BASEDIR: ${{ github.workspace }}/kernel_workspace

      BAZEL_CACHE_DIR: ${{ github.workspace }}/.bazel-cache
      BAZELISK_HOME: ${{ github.workspace }}/.bazelisk

      BASEBAND_GUARD_ENABLED: ${{ inputs.BASEBAND_GUARD && '1' || '0' }}
      NETFILTER_ENABLED: ${{ inputs.NETFILTER && '1' || '0' }}
      BBR_ECN_ENABLED: ${{ inputs.BBR_ECN && '1' || '0' }}
      UNICODE_BYPASS_ENABLED: ${{ inputs.UNICODE_BYPASS && '1' || '0' }}
      XUS_FIX_ENABLED: ${{ inputs.XUS_FIX && '1' || '0' }}
      SUSFS_DEV_ENABLED: ${{ inputs.SUSFS_DEV && '1' || '0' }}
      SKIP_DISK_CLEANUP_ENABLED: ${{ inputs.SKIP_DISK_CLEANUP && '1' || '0' }}
      DISABLE_CCACHE_ENABLED: ${{ inputs.DISABLE_CCACHE && '1' || '0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Device Configuration
        id: device_config
        shell: bash
        run: |
          set -euo pipefail

          case "${{ inputs.DEVICE }}" in
            "OnePlus 15")
              DEVICE_NAME="OnePlus 15"
              DEVICE_CODENAME="pineapple"
              CPU="sm8850"
              KERNEL_BRANCH="android16-6.12-2025-06"
              DEVICE_NAME_SAFE="OnePlus15"
              ;;
            "OnePlus 15T")
              DEVICE_NAME="OnePlus 15T"
              DEVICE_CODENAME="pineapple"
              CPU="sm8850"
              KERNEL_BRANCH="android16-6.12-2025-06"
              DEVICE_NAME_SAFE="OnePlus15T"
              ;;
            "OnePlus 15R")
              DEVICE_NAME="OnePlus 15R"
              DEVICE_CODENAME="aston"
              CPU="sm8845"
              KERNEL_BRANCH="android16-6.12-2025-09"
              DEVICE_NAME_SAFE="OnePlus15R"
              ;;
            "OnePlus Ace 6T")
              DEVICE_NAME="OnePlus Ace 6T"
              DEVICE_CODENAME="pineapple"
              CPU="sm8845"
              KERNEL_BRANCH="android16-6.12-2025-09"
              DEVICE_NAME_SAFE="Ace6T"
              ;;
            *)
              echo "::error::Unknown device: ${{ inputs.DEVICE }}"
              exit 1
              ;;
          esac

          {
            echo "DEVICE_NAME=$DEVICE_NAME"
            echo "DEVICE_CODENAME=$DEVICE_CODENAME"
            echo "CPU=$CPU"
            echo "KERNEL_BRANCH=$KERNEL_BRANCH"
            echo "DEVICE_NAME_SAFE=$DEVICE_NAME_SAFE"
          } >> "$GITHUB_ENV"

          {
            echo "DEVICE_NAME=$DEVICE_NAME"
            echo "DEVICE_CODENAME=$DEVICE_CODENAME"
            echo "CPU=$CPU"
            echo "KERNEL_BRANCH=$KERNEL_BRANCH"
            echo "DEVICE_NAME_SAFE=$DEVICE_NAME_SAFE"
          } >> "$GITHUB_OUTPUT"

          echo "Device: $DEVICE_NAME"
          echo "SoC: $CPU"
          echo "Branch: common-$KERNEL_BRANCH"

      - name: Record Build Start Time
        shell: bash
        run: |
          set -euo pipefail
          echo "BUILD_START_TIME=$(date +%s)" >> "$GITHUB_ENV"
          echo "BUILD_START_DATE=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_ENV"

      - name: Validate Inputs
        shell: bash
        run: |
          set -euo pipefail

          KSU_META="${{ inputs.KSU_META }}"
          if [[ ! "$KSU_META" =~ ^[^/]+/[^/]*/[^/]*$ ]]; then
            echo "::error::KSU_META format invalid. Expected: branch/tag/hash. Received: $KSU_META"
            exit 1
          fi

          SUSFS_META="${{ inputs.SUSFS_META }}"
          if [[ -n "$SUSFS_META" && "$SUSFS_META" != "-1" ]]; then
            if [[ ! "$SUSFS_META" =~ ^[a-fA-F0-9]{7,40}$|^[0-9]+$ ]]; then
              echo "::warning::SUSFS_META does not look like a Git hash or rollback number: $SUSFS_META"
            fi
          fi

          BUILD_TIME="${{ inputs.BUILD_TIME }}"
          if [[ -n "$BUILD_TIME" && "$BUILD_TIME" != "F" && "$BUILD_TIME" != "f" && "$BUILD_TIME" != "-1" ]]; then
            date -d "$BUILD_TIME" >/dev/null 2>&1 || {
              echo "::error::Invalid BUILD_TIME: $BUILD_TIME"
              exit 1
            }
          fi

          SUBLEVEL="${{ inputs.SUBLEVEL }}"
          if [[ -n "$SUBLEVEL" && ! "$SUBLEVEL" =~ ^[0-9]+$ ]]; then
            echo "::error::SUBLEVEL must be numeric"
            exit 1
          fi

          echo "Inputs validated"

      - name: Build Plan Summary
        shell: bash
        run: |
          set -euo pipefail

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          # Build Plan

          | Setting | Value |
          |--------|-------|
          | Device | ${DEVICE_NAME} |
          | SoC | ${CPU} |
          | Kernel branch | \`common-${KERNEL_BRANCH}\` |
          | Manager source | \`${{ inputs.MANAGER_SOURCE }}\` |
          | ReSukiSU setup branch | \`${{ inputs.KSU_SETUP_BRANCH }}\` |
          | KSU_META | \`${{ inputs.KSU_META }}\` |
          | SUSFS | ${{ inputs.SUSFS_META != '-1' && 'Enabled' || 'Disabled' }} |
          | SUSFS module source | \`${{ inputs.SUSFS_CI }}\` |
          | SUSFS dev branch | \`${{ inputs.SUSFS_DEV }}\` |
          | KPM mode | \`${{ inputs.KPM }}\` |
          | Baseband Guard | \`${{ inputs.BASEBAND_GUARD }}\` |
          | Netfilter | \`${{ inputs.NETFILTER }}\` |
          | BBR + ECN | \`${{ inputs.BBR_ECN }}\` |
          | Unicode bypass | \`${{ inputs.UNICODE_BYPASS }}\` |
          | No_5uS fix | \`${{ inputs.XUS_FIX }}\` |
          | Ccache | ${{ !inputs.DISABLE_CCACHE && 'Enabled' || 'Disabled' }} |
          | Create release | \`${{ inputs.CREATE_RELEASE }}\` |
          EOF

      - name: Risk Notice
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "## Risk Notice"
            echo ""

            if [ "${{ inputs.BASEBAND_GUARD }}" = "true" ]; then
              echo "- **Baseband Guard enabled:** this may affect vendor/security behavior."
            fi

            if [ "${{ inputs.NETFILTER }}" = "true" ]; then
              echo "- **NETFILTER enabled:** this changes network-related kernel configuration."
            fi

            if [ "${{ inputs.UNICODE_BYPASS }}" = "true" ]; then
              echo "- **Unicode bypass patch enabled:** patch compatibility depends on kernel source layout."
            fi

            if [ "${{ inputs.SUSFS_DEV }}" = "true" ]; then
              echo "- **SUSFS dev branch enabled:** this is less stable than the normal branch."
            fi

            if [ "${{ inputs.KSU_SETUP_BRANCH }}" = "dev" ]; then
              echo "- **ReSukiSU setup branch is dev:** upstream changes may break builds."
            fi

            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Free Disk Space
        if: ${{ !inputs.SKIP_DISK_CLEANUP }}
        shell: bash
        run: |
          set -euxo pipefail

          df -h

          sudo rm -rf \
            /opt/hostedtoolcache/go \
            /opt/hostedtoolcache/Ruby \
            /opt/hostedtoolcache/CodeQL \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /var/lib/apt/lists/* \
            /var/cache/apt/* || true

          sudo docker system prune -af 2>/dev/null || true

          df -h

      - name: Install Dependencies
        shell: bash
        run: |
          set -euxo pipefail

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3 git curl jq ccache libelf-dev build-essential flex bison libssl-dev \
            libncurses-dev liblz4-tool zlib1g-dev libxml2-utils rsync unzip gawk dos2unix \
            kmod libdw-dev elfutils zip bc cpio wget file patch dwarves

          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/* /var/cache/apt/* || true

          ccache --version | head -1 || true
          df -h

      - name: Configure Git
        shell: bash
        run: |
          set -euo pipefail

          git config --global user.name "OnePlus"
          git config --global user.email "oneplus@example.com"
          git config --global advice.detachedHead false

      - name: Restore Ccache
        if: ${{ !inputs.DISABLE_CCACHE }}
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ steps.device_config.outputs.KERNEL_BRANCH }}-${{ inputs.KSU_SETUP_BRANCH }}-${{ hashFiles('.github/workflows/*.yml') }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ steps.device_config.outputs.KERNEL_BRANCH }}-${{ inputs.KSU_SETUP_BRANCH }}-
            ccache-${{ runner.os }}-${{ steps.device_config.outputs.KERNEL_BRANCH }}-
            ccache-${{ runner.os }}-

      - name: Initialize Ccache
        if: ${{ !inputs.DISABLE_CCACHE }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$CCACHE_DIR" "${RUNNER_TEMP}/ccache-tmp"

          ccache --set-config=max_size="${CCACHE_MAXSIZE}"
          ccache --set-config=compression=true
          ccache --set-config=compression_level=6
          ccache --set-config=temporary_dir="${RUNNER_TEMP}/ccache-tmp"
          ccache --set-config=hash_dir=false
          ccache --set-config=compiler_check="%compiler% -dumpmachine; %compiler% -dumpversion"
          ccache --set-config=sloppiness=include_file_mtime,include_file_ctime,time_macros,file_macro,system_headers

          ccache -z
          ccache -s || true

      - name: Restore Bazel Cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.BAZEL_CACHE_DIR }}
            ${{ env.BAZELISK_HOME }}
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-${{ runner.os }}-${{ steps.device_config.outputs.KERNEL_BRANCH }}-${{ hashFiles('.github/workflows/*.yml') }}
          restore-keys: |
            bazel-${{ runner.os }}-${{ steps.device_config.outputs.KERNEL_BRANCH }}-
            bazel-${{ runner.os }}-

      - name: Install Repo Tool
        shell: bash
        run: |
          set -euo pipefail

          curl -fL --proto '=https' --tlsv1.2 \
            https://storage.googleapis.com/git-repo-downloads/repo \
            -o "$HOME/repo"

          chmod a+x "$HOME/repo"
          sudo mv "$HOME/repo" /usr/local/bin/repo
          repo version

      - name: Disk Space Check Before Sync
        shell: bash
        run: |
          set -euo pipefail

          df -h

          AVAIL_GB=$(df -BG "$GITHUB_WORKSPACE" | awk 'NR==2{gsub("G","",$4); print $4}')

          if [ "${AVAIL_GB:-0}" -lt 15 ]; then
            echo "::error::Only ${AVAIL_GB}GB free. Need at least 15GB before sync."
            exit 1
          fi

      - name: Initialize Repo and Sync
        shell: bash
        run: |
          set -euo pipefail

          retry_command() {
            local max_attempts=3
            local timeout_s=5
            local attempt=1

            while [ "$attempt" -le "$max_attempts" ]; do
              echo "Attempt $attempt/$max_attempts: $*"

              if "$@"; then
                return 0
              fi

              sleep "$timeout_s"
              timeout_s=$((timeout_s * 2))
              attempt=$((attempt + 1))
            done

            return 1
          }

          mkdir -p kernel_workspace
          cd kernel_workspace

          echo "Initializing repo for common-${KERNEL_BRANCH}"

          retry_command repo init \
            -u https://android.googlesource.com/kernel/manifest \
            -b "common-${KERNEL_BRANCH}" \
            --depth=1 \
            --no-clone-bundle \
            --no-tags

          echo "Syncing kernel source"

          SYNC_JOBS="$(nproc)"
          if [ "$SYNC_JOBS" -gt 8 ]; then
            SYNC_JOBS=8
          fi

          retry_command repo sync \
            -c \
            -j"${SYNC_JOBS}" \
            --prune \
            --no-clone-bundle \
            --no-tags \
            --force-sync \
            --current-branch \
            --optimized-fetch

          repo manifest -r > "$GITHUB_WORKSPACE/manifest-resolved.xml" || true

          if [ -e "common/BUILD.bazel" ]; then
            sed -i '/^[[:space:]]*"protected_exports_list"[[:space:]]*:[[:space:]]*"android\/abi_gki_protected_exports_aarch64",$/d' common/BUILD.bazel || true
          fi

          rm -f common/android/abi_gki_protected_exports_* 2>/dev/null || true

          echo "Repo sync completed"

      - name: Kernel Version Handling
        shell: bash
        run: |
          set -euo pipefail

          cd kernel_workspace

          BRANCH=""
          for f in ./common/build.config.constants ./common/build.config.common; do
            if [ -f "$f" ]; then
              BRANCH="$(grep -m1 '^BRANCH=' "$f" | cut -d= -f2 || true)"
              [ -n "$BRANCH" ] && break
            fi
          done

          if [ -n "$BRANCH" ]; then
            KANDROID_VERSION="${BRANCH%%-*}"
            KERNEL_VERSION="${BRANCH#"${KANDROID_VERSION}-"}"
          else
            KANDROID_VERSION="android16"
            KERNEL_VERSION="6.12"
          fi

          echo "KANDROID_VERSION=${KANDROID_VERSION}" >> "$GITHUB_ENV"
          echo "KERNEL_VERSION=${KERNEL_VERSION}" >> "$GITHUB_ENV"

          SUBLEVEL_INPUT="${{ inputs.SUBLEVEL }}"
          if [ -n "$SUBLEVEL_INPUT" ]; then
            sed -i "s/^\(SUBLEVEL[[:space:]]*=[[:space:]]*\).*/\1$SUBLEVEL_INPUT/" ./common/Makefile
          fi

          NEW_VERSION="$(awk '/^VERSION =/ {v=$3} /^PATCHLEVEL =/ {p=$3} /^SUBLEVEL =/ {s=$3} END {print v"."p"."s}' ./common/Makefile)"

          echo "TKERNEL_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"
          echo "KV1=${KERNEL_VERSION%%.*}" >> "$GITHUB_ENV"
          echo "KV2=$(echo "$KERNEL_VERSION" | tr -d '.')" >> "$GITHUB_ENV"
          echo "KV3=$(echo "$NEW_VERSION" | tr -d '.')" >> "$GITHUB_ENV"

          echo "Android kernel branch: ${KANDROID_VERSION}-${KERNEL_VERSION}"
          echo "Target kernel version: ${NEW_VERSION}"

      - name: Apply Kernel Suffix
        shell: bash
        run: |
          set -euo pipefail

          cd kernel_workspace

          KANDROID_VERSION="${KANDROID_VERSION:-android16}"
          INPUT_SUFFIX="${{ inputs.SUFFIX }}"

          if [ "$INPUT_SUFFIX" = "-1" ]; then
            echo "Kernel suffix disabled by user."
            exit 0
          elif [ -n "$INPUT_SUFFIX" ]; then
            SUFFIX="$INPUT_SUFFIX"
          else
            RANDOM_DIGIT=$(od -An -N1 -tu1 < /dev/urandom | tr -d '[:space:]' | awk '{print $1 % 11}')
            RANDOM_HASH=$(od -An -N7 -tx1 /dev/urandom | tr -d ' \n')
            SUFFIX="${RANDOM_DIGIT}-o-g${RANDOM_HASH}"
          fi

          echo "Using kernel suffix: $SUFFIX"

          apply_suffix() {
            local path="$1"

            [ -f "$path" ] || return 0

            sed -i 's/ -dirty//g' "$path"
            sed -i '$i res=$(echo "$res" | sed '\''s/-dirty//g'\'')' "$path"

            if grep -q 'KERNELVERSION.*scm_version' "$path"; then
              sed -i "s|echo \"\${KERNELVERSION}.*scm_version}\"|echo \"\${KERNELVERSION}-${KANDROID_VERSION}-${SUFFIX}\"|" "$path"
            elif grep -q 'echo "\$res"' "$path"; then
              tac "$path" | sed "0,/echo \"\\\$res\"/s//res=\\\$(echo \\\$res | cut -d- -f1-2)-${SUFFIX}; echo \"\\\$res\";/" | tac > "$path.tmp" && mv "$path.tmp" "$path"
            else
              echo "echo \"\$res-${SUFFIX}\"" >> "$path"
            fi

            chmod +x "$path"
          }

          apply_suffix "common/scripts/setlocalversion"
          apply_suffix "msm-kernel/scripts/setlocalversion"
          apply_suffix "external/dtc/scripts/setlocalversion"

      - name: Resolve Manager Source
        id: manager
        shell: bash
        run: |
          set -euo pipefail

          case "${{ inputs.MANAGER_SOURCE }}" in
            MD3_SPOOF)
              echo "manager_branch=main" >> "$GITHUB_OUTPUT"
              echo "manager_artifact=Spoofed-Manager-release" >> "$GITHUB_OUTPUT"
              ;;
            MD3|*)
              echo "manager_branch=main" >> "$GITHUB_OUTPUT"
              echo "manager_artifact=Manager-release" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Add ReSukiSU
        shell: bash
        run: |
          set -euo pipefail

          cd kernel_workspace

          KSU_META="${{ inputs.KSU_META }}"
          IFS='/' read -r BRANCH_NAME KSU_CUSTOM_TAG MANUAL_HASH <<< "$KSU_META"

          SETUP_BRANCH="${{ inputs.KSU_SETUP_BRANCH }}"

          echo "setup.sh branch: ${SETUP_BRANCH}"
          echo "ReSukiSU install branch: ${BRANCH_NAME}"
          echo "Custom tag: ${KSU_CUSTOM_TAG:-none}"
          echo "Manual hash: ${MANUAL_HASH:-latest}"

          curl -fL --proto '=https' --tlsv1.2 \
            -o /tmp/ksu_setup.sh \
            "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/${SETUP_BRANCH}/kernel/setup.sh"

          sha256sum /tmp/ksu_setup.sh || true
          bash /tmp/ksu_setup.sh "$BRANCH_NAME"

          cd ./KernelSU

          if [[ -n "${KSU_CUSTOM_TAG}" ]]; then
            echo "KSU_CUSTOM_TAG=${KSU_CUSTOM_TAG}" >> "$GITHUB_ENV"
          fi

          if [[ -n "${MANUAL_HASH}" ]]; then
            git fetch origin "${BRANCH_NAME}" --depth=100
            git checkout "${MANUAL_HASH}"
          fi

          KSU_COMMIT_SHA="$(git rev-parse HEAD)"
          echo "KSU_COMMIT_SHA=${KSU_COMMIT_SHA}" >> "$GITHUB_ENV"

          KSU_VERSION=$(expr "$(git rev-list --count HEAD 2>/dev/null || echo 13000)" + 30700)
          echo "KSUVER=${KSU_VERSION}" >> "$GITHUB_ENV"

          echo "ReSukiSU commit: ${KSU_COMMIT_SHA}"
          echo "ReSukiSU version code: ${KSU_VERSION}"

      - name: Apply Patches ReSukiSU and SUSFS
        shell: bash
        run: |
          set -euo pipefail

          cd kernel_workspace

          check_rejects() {
            local dir="${1:-.}"
            local rejects

            rejects="$(find "$dir" -name "*.rej" -type f 2>/dev/null || true)"

            if [ -n "$rejects" ]; then
              echo "::error::Patch reject files found"
              while IFS= read -r file; do
                echo "::group::Reject: $file"
                cat "$file"
                echo "::endgroup::"
              done <<< "$rejects"
              exit 1
            fi
          }

          [ -d "SukiSU_patch" ] || git clone https://github.com/ShirkNeko/SukiSU_patch.git
          [ -d "Action-Build" ] || git clone --depth=1 -b SukiSU-Ultra https://github.com/Numbersf/Action-Build.git

          if [ "${{ inputs.SUSFS_META }}" != "-1" ]; then
            SUSFS_META="${{ inputs.SUSFS_META }}"
            BR="gki-${KANDROID_VERSION}-${KERNEL_VERSION}$( [ "${{ inputs.SUSFS_DEV }}" = "true" ] && echo "-dev" || true )"

            git clone https://gitlab.com/simonpunk/susfs4ksu.git -b "$BR" susfs4ksu

            cd susfs4ksu

            if [ -n "$SUSFS_META" ]; then
              if [[ "$SUSFS_META" =~ ^[0-9]+$ ]]; then
                git checkout HEAD~"$SUSFS_META"
              else
                git checkout "$SUSFS_META"
              fi
            fi

            SUSFS_COMMIT_SHA="$(git rev-parse HEAD)"
            echo "SUSFS_COMMIT_SHA=${SUSFS_COMMIT_SHA}" >> "$GITHUB_ENV"
            echo "SUSFS_BRANCH_NAME=${BR}" >> "$GITHUB_ENV"

            if [ -f "VERSION" ]; then
              SUSVER="$(tr -d '\n' < VERSION)"
            else
              SUSVER="2.0.0+"
            fi

            echo "SUSVER=${SUSVER}" >> "$GITHUB_ENV"

            cd ..

            SUSFS_PATCH="./susfs4ksu/kernel_patches/50_add_susfs_in_gki-${KANDROID_VERSION}-${KERNEL_VERSION}.patch"

            if [ ! -f "$SUSFS_PATCH" ]; then
              echo "::error::SUSFS patch not found: $SUSFS_PATCH"
              find ./susfs4ksu/kernel_patches -maxdepth 2 -type f -name "*.patch" | sort || true
              exit 1
            fi

            cp "$SUSFS_PATCH" ./common/

            shopt -s nullglob
            fs_files=(./susfs4ksu/kernel_patches/fs/*)
            linux_files=(./susfs4ksu/kernel_patches/include/linux/*)

            if [ "${#fs_files[@]}" -gt 0 ]; then
              cp "${fs_files[@]}" ./common/fs/
            fi

            if [ "${#linux_files[@]}" -gt 0 ]; then
              cp "${linux_files[@]}" ./common/include/linux/
            fi
            shopt -u nullglob
          fi

          cd common

          apply_patch_safe() {
            local patch_file="$1"
            local description="${2:-$1}"

            if [ ! -f "$patch_file" ]; then
              echo "::warning::Patch not found: $patch_file"
              return 1
            fi

            echo "Applying: $description"

            if patch -p1 --dry-run < "$patch_file" >/dev/null 2>&1; then
              patch -p1 < "$patch_file"
              echo "Applied: $description"
              return 0
            fi

            echo "::warning::Patch already applied or conflicts: $description"
            return 1
          }

          fix_op15_recovery_bootloop_sus_mount() {
            if [ -f ./fs/statfs.c ] && grep -qF 'for (; mnt->mnt_id >= DEFAULT_KSU_MNT_ID; mnt = mnt->mnt_parent) { }' ./fs/statfs.c; then
              sed -i 's/for (; mnt->mnt_id >= DEFAULT_KSU_MNT_ID; mnt = mnt->mnt_parent) { }/for (; mnt->mnt_id >= DEFAULT_KSU_MNT_ID \&\& mnt->mnt_parent \&\& mnt != mnt->mnt_parent; mnt = mnt->mnt_parent) { }/g' ./fs/statfs.c
            fi

            if [ -f ./fs/proc/fd.c ] && grep -qF 'for (; mnt->mnt_id >= DEFAULT_KSU_MNT_ID; mnt = mnt->mnt_parent) { }' ./fs/proc/fd.c; then
              sed -i 's/for (; mnt->mnt_id >= DEFAULT_KSU_MNT_ID; mnt = mnt->mnt_parent) { }/for (; mnt->mnt_id >= DEFAULT_KSU_MNT_ID \&\& mnt->mnt_parent \&\& mnt != mnt->mnt_parent; mnt = mnt->mnt_parent) { }/g' ./fs/proc/fd.c
            fi

            if [ -f ./fs/statfs.c ] && grep -qF 'error = statfs_by_dentry(mnt->mnt.mnt_root, buf);' ./fs/statfs.c; then
              sed -i 's/error = statfs_by_dentry(mnt->mnt.mnt_root, buf);/if (likely(susfs_is_current_proc_umounted_app())) { error = statfs_by_dentry(mnt->mnt.mnt_root, buf); } else { error = statfs_by_dentry(path->dentry, buf); }/g' ./fs/statfs.c
            fi
          }

          if [ "${{ inputs.SUSFS_META }}" != "-1" ]; then
            apply_patch_safe "50_add_susfs_in_gki-${KANDROID_VERSION}-${KERNEL_VERSION}.patch" "SUSFS Integration" || true
            fix_op15_recovery_bootloop_sus_mount

            if [ "${{ inputs.XUS_FIX }}" = "true" ]; then
              apply_patch_safe "../../Action-Build/patches/No_5uS.patch" "No_5uS Fix" || true
            fi
          fi

          echo "Skipping ksu_toolkit.patch to avoid SELinux undefined-symbol issues on android16-6.12"
          check_rejects .

      - name: Apply Unicode Bypass
        if: ${{ inputs.UNICODE_BYPASS }}
        shell: bash
        run: |
          set -euo pipefail

          PATCH_DIR="${GITHUB_WORKSPACE}/kernel_workspace/Action-Build/patches"

          cd kernel_workspace/common

          if [ "${KV1:-0}" -lt 6 ]; then
            patch -p1 --forward < "${PATCH_DIR}/unicode_bypass_fix_6.1-.patch" || true
          else
            patch -p1 --forward < "${PATCH_DIR}/unicode_bypass_fix_6.1+.patch" || true
          fi

          if find . -name "*.rej" -type f | grep -q .; then
            echo "::error::Unicode patch generated reject files"
            find . -name "*.rej" -type f -exec echo "=== {} ===" \; -exec cat {} \;
            exit 1
          fi

      - name: Apply Baseband Guard
        if: ${{ inputs.BASEBAND_GUARD }}
        shell: bash
        run: |
          set -euo pipefail

          cd kernel_workspace/common

          curl -fL --proto '=https' --tlsv1.2 \
            -o /tmp/bbg_setup.sh \
            https://raw.githubusercontent.com/vc-teahouse/Baseband-guard/main/setup.sh

          sha256sum /tmp/bbg_setup.sh || true
          bash /tmp/bbg_setup.sh main

          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' ./security/Kconfig

      - name: Add Configuration Settings
        shell: bash
        run: |
          set -euo pipefail

          cd kernel_workspace/common

          CONFIG_FILE=./arch/arm64/configs/gki_defconfig
          MANAGER_BRANCH="${{ steps.manager.outputs.manager_branch }}"
          CPU="${CPU}"

          set_config() {
            local val="$1"
            local key="${val%%=*}"

            if grep -qE "^${key}=|^# ${key} is not set" "$CONFIG_FILE"; then
              awk -v key="$key" -v val="$val" '
                $0 ~ "^" key "=" || $0 == "# " key " is not set" {
                  print val
                  next
                }
                { print }
              ' "$CONFIG_FILE" > "${CONFIG_FILE}.tmp"
              mv "${CONFIG_FILE}.tmp" "$CONFIG_FILE"
            else
              echo "$val" >> "$CONFIG_FILE"
            fi
          }

          set_config "CONFIG_KSU=y"
          set_config "CONFIG_KSU_MULTI_MANAGER_SUPPORT=y"

          if [[ -n "${KSU_CUSTOM_TAG:-}" ]]; then
            set_config "CONFIG_KSU_FULL_NAME_FORMAT=\"%TAG_NAME%-${KSU_CUSTOM_TAG}@${MANAGER_BRANCH}[%COMMIT_SHA%]\""
          fi

          case "${{ inputs.KPM }}" in
            KPM)
              set_config "CONFIG_KPM=y"
              ;;
            KPN|N/A)
              set_config "CONFIG_KPM=n"
              ;;
          esac

          if [ "${{ inputs.SUSFS_META }}" != "-1" ]; then
            set_config "CONFIG_KSU_SUSFS=y"
            set_config "CONFIG_KSU_SUSFS_SUS_PATH=y"
            set_config "CONFIG_KSU_SUSFS_SUS_MAP=y"
            set_config "CONFIG_KSU_SUSFS_SUS_MOUNT=y"
            set_config "CONFIG_KSU_SUSFS_SUS_KSTAT=y"
            set_config "CONFIG_KSU_SUSFS_SPOOF_UNAME=y"
            set_config "CONFIG_KSU_SUSFS_ENABLE_LOG=y"
            set_config "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y"
            set_config "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y"
            set_config "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y"
          else
            set_config "CONFIG_KSU_SUSFS=n"
          fi

          set_config "CONFIG_TMPFS_XATTR=y"
          set_config "CONFIG_TMPFS_POSIX_ACL=y"

          set_config "CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y"
          set_config "CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE_O3=n"
          set_config "CONFIG_WQ_POWER_EFFICIENT_DEFAULT=y"
          set_config "CONFIG_OPTIMIZE_INLINING=y"

          set_config "CONFIG_DEBUG_KERNEL=n"
          set_config "CONFIG_DEBUG_INFO=n"
          set_config "CONFIG_DEBUG_INFO_DWARF4=n"
          set_config "CONFIG_LOCK_DEBUGGING=n"
          set_config "CONFIG_DEBUG_MUTEXES=n"
          set_config "CONFIG_DEBUG_SPINLOCK=n"
          set_config "CONFIG_DEBUG_ATOMIC_SLEEP=n"
          set_config "CONFIG_GDB_SCRIPTS=n"

          if [ "${BASEBAND_GUARD_ENABLED}" = "1" ]; then
            set_config "CONFIG_BBG=y"
          fi

          if [ "${BBR_ECN_ENABLED}" = "1" ]; then
            set_config "CONFIG_TCP_CONG_ADVANCED=y"
            set_config "CONFIG_TCP_CONG_BBR=y"
            set_config "CONFIG_NET_SCH_FQ=y"
            set_config "CONFIG_TCP_CONG_BIC=n"
            set_config "CONFIG_TCP_CONG_WESTWOOD=n"
            set_config "CONFIG_TCP_CONG_HTCP=n"
            set_config "CONFIG_IP_ECN=y"
            set_config "CONFIG_TCP_ECN=y"
            set_config "CONFIG_IPV6_ECN=y"
            set_config "CONFIG_IP_NF_TARGET_ECN=y"
          fi

          if [[ "$CPU" == sm* && "${NETFILTER_ENABLED}" = "1" ]]; then
            set_config "CONFIG_BPF_STREAM_PARSER=y"
            set_config "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y"
            set_config "CONFIG_NETFILTER_XT_SET=y"
            set_config "CONFIG_IP_SET=y"
            set_config "CONFIG_IP_SET_MAX=65534"
            set_config "CONFIG_IP_SET_BITMAP_IP=y"
            set_config "CONFIG_IP_SET_BITMAP_IPMAC=y"
            set_config "CONFIG_IP_SET_BITMAP_PORT=y"
            set_config "CONFIG_IP_SET_HASH_IP=y"
            set_config "CONFIG_IP_SET_HASH_IPMARK=y"
            set_config "CONFIG_IP_SET_HASH_IPPORT=y"
            set_config "CONFIG_IP_SET_HASH_IPPORTIP=y"
            set_config "CONFIG_IP_SET_HASH_IPPORTNET=y"
            set_config "CONFIG_IP_SET_HASH_IPMAC=y"
            set_config "CONFIG_IP_SET_HASH_MAC=y"
            set_config "CONFIG_IP_SET_HASH_NETPORTNET=y"
            set_config "CONFIG_IP_SET_HASH_NET=y"
            set_config "CONFIG_IP_SET_HASH_NETNET=y"
            set_config "CONFIG_IP_SET_HASH_NETPORT=y"
            set_config "CONFIG_IP_SET_HASH_NETIFACE=y"
            set_config "CONFIG_IP_SET_LIST_SET=y"
            set_config "CONFIG_IP6_NF_NAT=y"
            set_config "CONFIG_IP6_NF_TARGET_MASQUERADE=y"
          fi

          sed -i 's/check_defconfig//' ./build.config.gki || true

      - name: Fix IPv6_NAT Error
        if: ${{ inputs.NETFILTER }}
        shell: bash
        run: |
          set -euo pipefail

          PATCH_DIR="${GITHUB_WORKSPACE}/kernel_workspace/Action-Build/patches"

          cd kernel_workspace/common

          if [[ "${CPU}" == sm* ]]; then
            echo "Patching IPv6_NAT_FIX.patch"

            if ! patch -p1 -F 3 < "${PATCH_DIR}/IPv6_NAT_FIX.patch"; then
              echo "::error::IPv6_NAT_FIX patch failed. Dumping all .rej files:"
              find . -name "*.rej" -exec echo "=== {} ===" \; -exec cat {} \;
              exit 1
            fi
          else
            echo "CPU is not Snapdragon-style sm*. Skipping IPv6 NAT fix."
          fi

      - name: Custom BUILD_TIME
        if: ${{ inputs.BUILD_TIME != '-1' }}
        shell: bash
        run: |
          set -euo pipefail

          INPUT_TIME="${{ inputs.BUILD_TIME }}"

          if [[ -n "$INPUT_TIME" && "$INPUT_TIME" != "F" && "$INPUT_TIME" != "f" ]]; then
            DATESTR="$INPUT_TIME"
          else
            DATESTR="$(TZ='UTC' date +'%a %b %d %T %Z %Y')"
          fi

          echo "KBUILD_BUILD_TIMESTAMP=${DATESTR}" >> "$GITHUB_ENV"
          echo "KBUILD_BUILD_VERSION=1" >> "$GITHUB_ENV"

          cd kernel_workspace

          for f in common/scripts/mkcompile_h msm-kernel/scripts/mkcompile_h; do
            if [ -f "$f" ]; then
              if grep -q 'UTS_VERSION=' "$f"; then
                perl -pi -e "s{UTS_VERSION=\"\\\$\\(.*?\\)\"}{UTS_VERSION=\"#1 SMP PREEMPT $DATESTR\"}" "$f"
              else
                perl -0777 -pi -e "s{cat <<EOF}{cat <<EOF\n#undef UTS_VERSION\n#define UTS_VERSION \"#1 SMP PREEMPT $DATESTR\" } unless /UTS_VERSION/" "$f"
              fi
            fi
          done

      - name: Modules Configuration
        if: ${{ contains(env.KERNEL_BRANCH, 'android16-6.12') }}
        shell: bash
        run: |
          set -euo pipefail

          sed -i '0,/protected_module_names_list *= *":gki_aarch64_protected_module_names"/s//check_defconfig = "disabled"/' \
            kernel_workspace/common/BUILD.bazel || true

      - name: Validate Bazel Target
        shell: bash
        run: |
          set -euo pipefail

          cd kernel_workspace

          if [ -x tools/bazel ]; then
            tools/bazel query //common:kernel_aarch64_dist >/dev/null
            echo "Bazel target available: //common:kernel_aarch64_dist"
          elif [ -f build/build.sh ]; then
            echo "build/build.sh exists. Bazel target validation skipped."
          else
            echo "::error::Neither tools/bazel nor build/build.sh was found."
            find . -maxdepth 3 \( -name bazel -o -name build.sh -o -name BUILD.bazel \) -print | sort
            exit 1
          fi

      - name: Pre-Build Disk Check
        shell: bash
        run: |
          set -euo pipefail

          df -h

          AVAIL_GB=$(df -BG "$GITHUB_WORKSPACE" | awk 'NR==2{gsub("G","",$4); print $4}')

          if [ "${AVAIL_GB:-0}" -lt 10 ]; then
            echo "::error::Only ${AVAIL_GB}GB free. Minimum 10GB required."
            exit 1
          fi

      - name: Build Kernel
        shell: bash
        run: |
          set -euo pipefail

          cd kernel_workspace

          ROOT="$PWD"
          NPROC="$(nproc)"
          BUILD_THREADS="$((NPROC + 2))"

          if [ "$BUILD_THREADS" -gt 12 ]; then
            BUILD_THREADS=12
          fi

          export MAKEFLAGS="-j${BUILD_THREADS}"

          echo "Starting kernel build at $(date)"
          echo "CPU cores: ${NPROC}"
          echo "Build threads: ${BUILD_THREADS}"

          if [ "${DISABLE_CCACHE_ENABLED}" != "1" ]; then
            echo "Enabling ccache"

            export PATH="/usr/lib/ccache:$PATH"
            export USE_CCACHE=1
            export CCACHE_EXEC="$(command -v ccache)"
            export CCACHE_DIR="${CCACHE_DIR}"
            export CCACHE_BASEDIR="${GITHUB_WORKSPACE}/kernel_workspace"
            export CCACHE_NOHASHDIR=true
            export CCACHE_COMPILERCHECK="%compiler% -dumpmachine; %compiler% -dumpversion"
            export CCACHE_SLOPPINESS="include_file_mtime,include_file_ctime,time_macros,file_macro,system_headers"

            export CC="ccache clang"
            export CXX="ccache clang++"
            export HOSTCC="ccache clang"
            export HOSTCXX="ccache clang++"

            ccache -s || true
          else
            echo "DISABLE_CCACHE enabled, ccache disabled"
          fi

          mkdir -p "${BAZEL_CACHE_DIR}/repository" "${BAZELISK_HOME}"

          export BAZELISK_HOME="${BAZELISK_HOME}"

          if [ -f "build/build.sh" ]; then
            echo "Using build/build.sh path"

            time env \
              LTO=none \
              BUILD_CONFIG=common/build.config.gki.aarch64 \
              USE_CCACHE="${USE_CCACHE:-0}" \
              CCACHE_EXEC="${CCACHE_EXEC:-}" \
              CCACHE_DIR="${CCACHE_DIR:-}" \
              CCACHE_BASEDIR="${CCACHE_BASEDIR:-}" \
              build/build.sh 2>&1 | tee "$ROOT/build.log"
          else
            echo "Using Bazel/Kleaf path"

            BAZEL_ARGS=(
              --config=fast
              --lto=none
              --jobs="${BUILD_THREADS}"
              --disk_cache="${BAZEL_CACHE_DIR}"
              --repository_cache="${BAZEL_CACHE_DIR}/repository"
              --experimental_repository_cache_hardlinks
              --action_env=USE_CCACHE="${USE_CCACHE:-0}"
              --action_env=CCACHE_EXEC="${CCACHE_EXEC:-}"
              --action_env=CCACHE_DIR="${CCACHE_DIR:-}"
              --action_env=CCACHE_BASEDIR="${CCACHE_BASEDIR:-}"
              --action_env=CCACHE_NOHASHDIR="${CCACHE_NOHASHDIR:-true}"
              --action_env=CCACHE_COMPILERCHECK="${CCACHE_COMPILERCHECK:-%compiler% -dumpmachine; %compiler% -dumpversion}"
              --action_env=CCACHE_SLOPPINESS="${CCACHE_SLOPPINESS:-include_file_mtime,include_file_ctime,time_macros,file_macro,system_headers}"
            )

            time tools/bazel build \
              "${BAZEL_ARGS[@]}" \
              //common:kernel_aarch64_dist 2>&1 | tee "$ROOT/build.log"
          fi

          echo "Kernel build completed at $(date)"

          if [ "${DISABLE_CCACHE_ENABLED}" != "1" ]; then
            ccache -s || true
          fi

      - name: Capture Ccache Stats
        if: ${{ always() && !inputs.DISABLE_CCACHE }}
        shell: bash
        run: |
          set +e

          ccache -s || true

          HIT_RATE="$(ccache -s | grep -i "hit rate" | awk '{print $NF}' | head -1 || echo "N/A")"
          CACHEABLE="$(ccache -s | awk '/Cacheable calls:/ {print $3}' | tr -d ',' | head -1 || echo "0")"

          echo "CCACHE_HIT_RATE=${HIT_RATE:-N/A}" >> "$GITHUB_ENV"
          echo "CCACHE_CACHEABLE_CALLS=${CACHEABLE:-0}" >> "$GITHUB_ENV"

      - name: Make AnyKernel3
        shell: bash
        run: |
          set -euo pipefail

          git clone https://github.com/Bouteillepleine/AnyKernel3 --depth=1

          rm -rf ./AnyKernel3/.git

          mkdir -p kernel_workspace/out/Final-Image-Find/

          SEARCH_PATHS=(
            "kernel_workspace/out"
            "kernel_workspace/common/out"
            "kernel_workspace/bazel-bin/common"
            "kernel_workspace/bazel-bin/common/kernel_aarch64"
            "kernel_workspace/bazel-bin/common/kernel_aarch64/dist"
          )

          image_path=""

          for base in "${SEARCH_PATHS[@]}"; do
            [ -d "$base" ] || continue

            image_path="$(find "$base" \
              \( -path "*/dist/Image" -o -path "*/kernel_aarch64/Image" -o -name "Image" \) \
              -type f \
              -printf '%T@ %p\n' 2>/dev/null | sort -rn | head -1 | cut -d' ' -f2- || true)"

            if [ -n "$image_path" ] && [ -f "$image_path" ]; then
              echo "Image found: $image_path"
              break
            fi
          done

          if [ -z "$image_path" ] || [ ! -f "$image_path" ]; then
            echo "::error::Image file not found"
            find kernel_workspace -name "Image" -type f -print 2>/dev/null | head -50 || true
            exit 1
          fi

          if ! file "$image_path" | grep -qi "ARM64"; then
            echo "::error::Image does not appear to be ARM64"
            file "$image_path"
            exit 1
          fi

          cp "$image_path" ./AnyKernel3/Image
          cp "$image_path" kernel_workspace/out/Final-Image-Find/Image

      - name: Download SUSFS Module
        if: ${{ inputs.SUSFS_META != '-1' && inputs.SUSFS_CI != 'N/A' }}
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          case "${{ inputs.SUSFS_CI }}" in
            CI)
              echo "Downloading SUSFS module from CI"

              LATEST_RUN_ID=$(curl -sf -H "Authorization: Bearer ${{ github.token }}" \
                "https://api.github.com/repos/sidex15/susfs4ksu-module/actions/runs?status=success&per_page=10" | \
                jq -r '.workflow_runs[] | select(.head_branch == "v1.5.2+") | .id' | head -n 1)

              if [ -z "$LATEST_RUN_ID" ]; then
                echo "No successful CI run found. Falling back to Release."
                RELEASE_URL="https://github.com/sidex15/ksu_module_susfs/releases/download/v1.5.2+/ksu_module_susfs_1.5.2+.zip"
                MODULE_ZIP="ksu_module_susfs_1.5.2+_Release.zip"

                if curl -Lf -o "$MODULE_ZIP" "$RELEASE_URL"; then
                  cp "$MODULE_ZIP" ./AnyKernel3/ || true
                fi

                exit 0
              fi

              ARTIFACT_URL=$(curl -sf -H "Authorization: Bearer ${{ github.token }}" \
                "https://api.github.com/repos/sidex15/susfs4ksu-module/actions/runs/$LATEST_RUN_ID/artifacts" | \
                jq -r '.artifacts[0].archive_download_url')

              if [ -n "$ARTIFACT_URL" ] && [ "$ARTIFACT_URL" != "null" ]; then
                MODULE_ZIP="ksu_module_susfs_1.5.2+_CI.zip"
                curl -Lf -H "Authorization: Bearer ${{ github.token }}" -o "$MODULE_ZIP" "$ARTIFACT_URL" || true
                [ -f "$MODULE_ZIP" ] && cp "$MODULE_ZIP" ./AnyKernel3/ || true
              fi
              ;;

            Release)
              echo "Downloading SUSFS module from Release"
              RELEASE_URL="https://github.com/sidex15/ksu_module_susfs/releases/download/v1.5.2+/ksu_module_susfs_1.5.2+.zip"
              MODULE_ZIP="ksu_module_susfs_1.5.2+_Release.zip"

              if curl -Lf -o "$MODULE_ZIP" "$RELEASE_URL"; then
                cp "$MODULE_ZIP" ./AnyKernel3/ || true
              fi
              ;;

            *)
              echo "SUSFS module download disabled"
              ;;
          esac

      - name: Set ZIP Suffix
        id: suffix
        shell: bash
        run: |
          set -euo pipefail

          suf=""

          [ "${BASEBAND_GUARD_ENABLED}" = "1" ] && suf="${suf}_BBG"
          [ "${NETFILTER_ENABLED}" = "1" ] && suf="${suf}_NETFILTER"
          [ "${BBR_ECN_ENABLED}" = "1" ] && suf="${suf}_BBR_ECN"
          [ "${{ inputs.SUSFS_META }}" != "-1" ] && suf="${suf}_SUSFS"
          [ "${{ inputs.KPM }}" = "KPM" ] && suf="${suf}_KPM"
          [ "${{ inputs.KPM }}" = "KPN" ] && suf="${suf}_KPN"

          echo "value=${suf}" >> "$GITHUB_OUTPUT"

      - name: Zip AnyKernel3
        id: zip
        shell: bash
        run: |
          set -euo pipefail

          ZIP_NAME="AnyKernel3_${{ inputs.MANAGER_SOURCE }}_${KSUVER}_${DEVICE_NAME_SAFE}_${TKERNEL_VERSION}${{ steps.suffix.outputs.value }}.zip"

          echo "Creating: $ZIP_NAME"

          SUSFS_MODULE_PRESENT=false

          if [ "${{ inputs.SUSFS_META }}" != "-1" ]; then
            if ls AnyKernel3/ksu_module_susfs*.zip 1>/dev/null 2>&1; then
              SUSFS_MODULE_PRESENT=true
            fi
          fi

          cd AnyKernel3

          if [ "$SUSFS_MODULE_PRESENT" = true ]; then
            zip -r9 "${GITHUB_WORKSPACE}/${ZIP_NAME}" . \
              -x "*.git*" \
              -x "AnyKernel3*.zip"
          else
            zip -r9 "${GITHUB_WORKSPACE}/${ZIP_NAME}" . \
              -x "*.git*" \
              -x "*.zip"
          fi

          cd ..

          ZIP_PATH="${GITHUB_WORKSPACE}/${ZIP_NAME}"

          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"
          echo "ZIP_PATH=${ZIP_PATH}" >> "$GITHUB_ENV"
          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"
          echo "zip_path=${ZIP_PATH}" >> "$GITHUB_OUTPUT"

          ZIP_SIZE=$(du -h "$ZIP_PATH" | awk '{print $1}')
          echo "ZIP_SIZE=${ZIP_SIZE}" >> "$GITHUB_ENV"

          unzip -l "$ZIP_PATH" | grep -E "(Image|ksu_module_susfs|anykernel.sh)" || true

      - name: Calculate Build Metrics
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${BUILD_START_TIME:-}" ]; then
            BUILD_END_TIME=$(date +%s)
            BUILD_DURATION=$((BUILD_END_TIME - BUILD_START_TIME))
            MINUTES=$((BUILD_DURATION / 60))
            SECS=$((BUILD_DURATION % 60))
            echo "BUILD_DURATION_TEXT=${MINUTES}m ${SECS}s" >> "$GITHUB_ENV"
          else
            echo "BUILD_DURATION_TEXT=N/A" >> "$GITHUB_ENV"
          fi

          BUILD_LOG="kernel_workspace/build.log"

          if [ -f "$BUILD_LOG" ]; then
            WARNINGS_COUNT="$(grep -c "warning:" "$BUILD_LOG" 2>/dev/null || echo 0)"
          else
            WARNINGS_COUNT="0"
          fi

          echo "WARNINGS_COUNT=${WARNINGS_COUNT}" >> "$GITHUB_ENV"

          if [ -f "${ZIP_PATH:-}" ]; then
            ZIP_SHA256="$(sha256sum "${ZIP_PATH}" | awk '{print $1}')"
            ZIP_SIZE="$(du -h "${ZIP_PATH}" | awk '{print $1}')"
          else
            ZIP_SHA256="N/A"
            ZIP_SIZE="N/A"
          fi

          if [ -f "${GITHUB_WORKSPACE}/AnyKernel3/Image" ]; then
            IMAGE_SHA256="$(sha256sum "${GITHUB_WORKSPACE}/AnyKernel3/Image" | awk '{print $1}')"
            IMAGE_SIZE="$(du -h "${GITHUB_WORKSPACE}/AnyKernel3/Image" | awk '{print $1}')"
          else
            IMAGE_SHA256="N/A"
            IMAGE_SIZE="N/A"
          fi

          echo "ZIP_SHA256=${ZIP_SHA256}" >> "$GITHUB_ENV"
          echo "ZIP_SIZE=${ZIP_SIZE}" >> "$GITHUB_ENV"
          echo "IMAGE_SHA256=${IMAGE_SHA256}" >> "$GITHUB_ENV"
          echo "IMAGE_SIZE=${IMAGE_SIZE}" >> "$GITHUB_ENV"

      - name: Upload AK3 ZIP Artifact
        if: ${{ success() && steps.zip.outputs.zip_path != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zip.outputs.zip_name }}
          path: ${{ steps.zip.outputs.zip_path }}
          retention-days: 30
          compression-level: 0

      - name: Upload AK3 ZIP to GitHub Release
        if: ${{ success() && inputs.CREATE_RELEASE && steps.zip.outputs.zip_path != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.DEVICE_NAME_SAFE }}-${{ env.TKERNEL_VERSION }}-${{ github.run_id }}
          name: ${{ env.DEVICE_NAME }} ReSukiSU ${{ env.TKERNEL_VERSION }}
          files: ${{ steps.zip.outputs.zip_path }}
          body: |
            ## Build Info

            - Device: ${{ env.DEVICE_NAME }}
            - SoC: ${{ env.CPU }}
            - Kernel: ${{ env.TKERNEL_VERSION }}
            - Branch: common-${{ env.KERNEL_BRANCH }}
            - ReSukiSU version: ${{ env.KSUVER }}
            - Manager source: ${{ inputs.MANAGER_SOURCE }}
            - SUSFS: ${{ inputs.SUSFS_META != '-1' && 'Enabled' || 'Disabled' }}
            - SUSFS source: ${{ inputs.SUSFS_CI }}
            - KPM mode: ${{ inputs.KPM }}
            - Baseband Guard: ${{ inputs.BASEBAND_GUARD }}
            - Netfilter: ${{ inputs.NETFILTER }}
            - BBR + ECN: ${{ inputs.BBR_ECN }}
            - Build run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ## Checksums

            - ZIP SHA256: `${{ env.ZIP_SHA256 }}`
            - Image SHA256: `${{ env.IMAGE_SHA256 }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          KSU_COMMIT_SHA="${KSU_COMMIT_SHA:-N/A}"
          KSUVER="${KSUVER:-N/A}"
          TKERNEL_VERSION="${TKERNEL_VERSION:-N/A}"
          KANDROID_VERSION="${KANDROID_VERSION:-N/A}"
          KERNEL_VERSION="${KERNEL_VERSION:-N/A}"
          BUILD_DURATION_TEXT="${BUILD_DURATION_TEXT:-N/A}"
          WARNINGS_COUNT="${WARNINGS_COUNT:-N/A}"
          ZIP_NAME="${ZIP_NAME:-N/A}"
          ZIP_SHA256="${ZIP_SHA256:-N/A}"
          ZIP_SIZE="${ZIP_SIZE:-N/A}"
          IMAGE_SHA256="${IMAGE_SHA256:-N/A}"
          IMAGE_SIZE="${IMAGE_SIZE:-N/A}"
          CCACHE_HIT_RATE="${CCACHE_HIT_RATE:-N/A}"
          CCACHE_CACHEABLE_CALLS="${CCACHE_CACHEABLE_CALLS:-N/A}"

          if [ "${{ job.status }}" = "success" ]; then
            STATUS_TEXT="SUCCESS"
            STATUS_COLOR="🟢"
          elif [ "${{ job.status }}" = "failure" ]; then
            STATUS_TEXT="FAILED"
            STATUS_COLOR="🔴"
          else
            STATUS_TEXT="CANCELLED"
            STATUS_COLOR="🟡"
          fi

          RELEASE_TAG="${DEVICE_NAME_SAFE}-${TKERNEL_VERSION}-${{ github.run_id }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${RELEASE_TAG}"

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          # ${STATUS_COLOR} ${DEVICE_NAME} ReSukiSU Kernel Build ${STATUS_TEXT}

          ## Build Status

          | Property | Value |
          |----------|-------|
          | Status | ${STATUS_TEXT} |
          | Duration | ${BUILD_DURATION_TEXT} |
          | Warnings | ${WARNINGS_COUNT} |

          ## Device

          | Property | Value |
          |----------|-------|
          | Device | ${DEVICE_NAME} |
          | SoC | ${CPU} |
          | Android Version | ${KANDROID_VERSION} |
          | Kernel Version | ${TKERNEL_VERSION} |
          | Branch | common-${KERNEL_BRANCH} |

          ## ReSukiSU

          | Property | Value |
          |----------|-------|
          | setup.sh branch | ${{ inputs.KSU_SETUP_BRANCH }} |
          | KSU_META | \`${{ inputs.KSU_META }}\` |
          | KSU Version | ${KSUVER} |
          | KSU Commit | ${KSU_COMMIT_SHA} |

          ## SUSFS

          | Property | Value |
          |----------|-------|
          | Enabled | ${{ inputs.SUSFS_META != '-1' && 'Yes' || 'No' }} |
          | Module Source | ${{ inputs.SUSFS_CI }} |
          | Version | ${SUSVER:-N/A} |
          | Branch | ${SUSFS_BRANCH_NAME:-N/A} |
          | Commit | ${SUSFS_COMMIT_SHA:-N/A} |

          ## Output

          | File | Details |
          |------|---------|
          | ZIP Name | \`${ZIP_NAME}\` |
          | ZIP Size | ${ZIP_SIZE} |
          | ZIP SHA256 | \`${ZIP_SHA256}\` |
          | Image Size | ${IMAGE_SIZE} |
          | Image SHA256 | \`${IMAGE_SHA256}\` |
          | Artifact | Uploaded when build succeeds |
          | Release | ${{ inputs.CREATE_RELEASE && format('[Download]({0})', env.RELEASE_URL) || 'Disabled' }} |

          ## Performance

          | Metric | Value |
          |--------|-------|
          | Ccache Hit Rate | ${CCACHE_HIT_RATE} |
          | Ccache Cacheable Calls | ${CCACHE_CACHEABLE_CALLS} |
          | Parallel Jobs | $(nproc) cores |

          EOF

      - name: Upload Diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-${{ env.DEVICE_NAME_SAFE || inputs.DEVICE }}-${{ github.run_id }}
          path: |
            manifest-resolved.xml
            kernel_workspace/build.log
            kernel_workspace/**/*.log
            kernel_workspace/**/*.rej
            kernel_workspace/common/out/.config
            kernel_workspace/out/**/.config
          retention-days: 30
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          if [ "${SKIP_DISK_CLEANUP_ENABLED}" != "1" ]; then
            sudo rm -rf \
              kernel_workspace/common/out \
              kernel_workspace/out \
              kernel_workspace/.repo \
              /tmp/* \
              /var/tmp/* 2>/dev/null || true
          fi

          df -h

      - name: Final Status Check
        if: always()
        shell: bash
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "BUILD SUCCESSFUL"
            echo "Device: ${DEVICE_NAME:-N/A}"
            echo "Kernel ZIP: ${ZIP_NAME:-N/A}"
            echo "Size: ${ZIP_SIZE:-N/A}"
            echo "Duration: ${BUILD_DURATION_TEXT:-N/A}"
            echo "Ccache Hit Rate: ${CCACHE_HIT_RATE:-N/A}"
            echo "Ccache Cacheable Calls: ${CCACHE_CACHEABLE_CALLS:-N/A}"
          elif [ "${{ job.status }}" = "failure" ]; then
            echo "BUILD FAILED"
            echo "Device: ${DEVICE_NAME:-N/A}"
            echo "Check diagnostics artifact and build log."
          else
            echo "BUILD CANCELLED"
          fi
