name: Cleanup Cache & Artifacts

on:
  workflow_dispatch:
    inputs:
      CLEANUP_TYPE:
        type: choice
        description: "Type de nettoyage"
        required: true
        default: all
        options:
          - all
          - ccache
          - artifacts
          - old-runs

      FILE_FILTER:
        type: choice
        description: "Filtre de configuration (pour ccache)"
        required: false
        default: all
        options:
          - all
          - android16-6.12-2025-06

      DAYS_OLD:
        type: number
        description: "Supprimer les éléments plus vieux que X jours"
        required: false
        default: 7

      DRY_RUN:
        type: boolean
        description: "Mode simulation (ne supprime rien)"
        required: true
        default: true

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    name: 🧹 Cleanup ${{ inputs.CLEANUP_TYPE }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 🔍 Analyze Current Cleanup Plan
        id: analyze
        shell: bash
        run: |
          set -euo pipefail

          echo "::group::📊 Analyse du nettoyage"

          echo "Configuration cible: ${{ inputs.FILE_FILTER }}"
          echo "Type de nettoyage: ${{ inputs.CLEANUP_TYPE }}"
          echo "Ancienneté: ${{ inputs.DAYS_OLD }} jours"
          echo "Mode simulation: ${{ inputs.DRY_RUN }}"

          CUTOFF_DATE="$(date -u -d "${{ inputs.DAYS_OLD }} days ago" +%Y-%m-%d)"
          echo "CUTOFF_DATE=$CUTOFF_DATE" >> "$GITHUB_ENV"

          echo "::endgroup::"

      - name: 🗑️ Clean Ccache
        id: clean_ccache
        if: ${{ inputs.CLEANUP_TYPE == 'all' || inputs.CLEANUP_TYPE == 'ccache' }}
        uses: actions/github-script@v7
        with:
          script: |
            const dryRun = '${{ inputs.DRY_RUN }}' === 'true';
            const fileFilter = '${{ inputs.FILE_FILTER }}';
            const daysOld = Number('${{ inputs.DAYS_OLD }}');

            console.log('🧹 Nettoyage des caches ccache...');
            console.log(`Mode: ${dryRun ? '🔍 SIMULATION' : '🗑️ SUPPRESSION RÉELLE'}`);

            try {
              const caches = await github.paginate(github.rest.actions.getActionsCacheList, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100
              });

              let matchedCount = 0;
              let deletedCount = 0;
              let totalSize = 0;

              const cutoffDate = new Date();
              cutoffDate.setDate(cutoffDate.getDate() - daysOld);

              for (const cache of caches) {
                const cacheDate = new Date(cache.created_at);
                const matchesFilter = fileFilter === 'all' || cache.key.includes(fileFilter);
                const isOld = cacheDate < cutoffDate;
                const isCcache = cache.key.includes('ccache');

                if (isCcache && matchesFilter && isOld) {
                  matchedCount++;
                  totalSize += cache.size_in_bytes;

                  console.log(`📦 Cache trouvé: ${cache.key}`);
                  console.log(`   ID: ${cache.id}`);
                  console.log(`   Taille: ${(cache.size_in_bytes / 1024 / 1024).toFixed(2)} MB`);
                  console.log(`   Créé le: ${cache.created_at}`);
                  console.log(`   Dernier accès: ${cache.last_accessed_at}`);
                  console.log(`   Âge: ${Math.floor((Date.now() - cacheDate) / (1000 * 60 * 60 * 24))} jours`);

                  if (!dryRun) {
                    try {
                      await github.rest.actions.deleteActionsCacheById({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        cache_id: cache.id
                      });
                      console.log('   ✅ Supprimé');
                      deletedCount++;
                    } catch (error) {
                      console.log(`   ❌ Erreur: ${error.message}`);
                    }
                  } else {
                    console.log('   🔍 [SIMULATION] Serait supprimé');
                  }

                  console.log('');
                }
              }

              const sizeMb = (totalSize / 1024 / 1024).toFixed(2);

              console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
              console.log('📊 Résumé du nettoyage ccache:');
              console.log(`   Caches correspondants: ${matchedCount}`);
              console.log(`   Caches ${dryRun ? 'à supprimer' : 'supprimés'}: ${dryRun ? matchedCount : deletedCount}`);
              console.log(`   Espace ${dryRun ? 'à libérer' : 'libéré potentiel'}: ${sizeMb} MB`);
              console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');

              core.setOutput('matched', String(matchedCount));
              core.setOutput('deleted', String(dryRun ? matchedCount : deletedCount));
              core.setOutput('size_mb', sizeMb);
            } catch (error) {
              console.error('❌ Erreur lors du nettoyage ccache:', error);
              core.setFailed(error.message);
            }

      - name: 🗑️ Clean Build Artifacts
        id: clean_artifacts
        if: ${{ inputs.CLEANUP_TYPE == 'all' || inputs.CLEANUP_TYPE == 'artifacts' }}
        uses: actions/github-script@v7
        with:
          script: |
            const dryRun = '${{ inputs.DRY_RUN }}' === 'true';
            const daysOld = Number('${{ inputs.DAYS_OLD }}');

            console.log('🧹 Nettoyage des artefacts de build...');
            console.log(`Mode: ${dryRun ? '🔍 SIMULATION' : '🗑️ SUPPRESSION RÉELLE'}`);

            try {
              const artifacts = await github.paginate(github.rest.actions.listArtifactsForRepo, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100
              });

              let matchedCount = 0;
              let deletedCount = 0;
              let totalSize = 0;

              const cutoffDate = new Date();
              cutoffDate.setDate(cutoffDate.getDate() - daysOld);

              for (const artifact of artifacts) {
                const artifactDate = new Date(artifact.created_at);
                const isOld = artifactDate < cutoffDate;

                if (isOld) {
                  matchedCount++;
                  totalSize += artifact.size_in_bytes;

                  console.log(`📦 Artefact trouvé: ${artifact.name}`);
                  console.log(`   ID: ${artifact.id}`);
                  console.log(`   Taille: ${(artifact.size_in_bytes / 1024 / 1024).toFixed(2)} MB`);
                  console.log(`   Créé le: ${artifact.created_at}`);
                  console.log(`   Expire le: ${artifact.expires_at}`);
                  console.log(`   Âge: ${Math.floor((Date.now() - artifactDate) / (1000 * 60 * 60 * 24))} jours`);

                  if (!dryRun) {
                    try {
                      await github.rest.actions.deleteArtifact({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        artifact_id: artifact.id
                      });
                      console.log('   ✅ Supprimé');
                      deletedCount++;
                    } catch (error) {
                      console.log(`   ❌ Erreur: ${error.message}`);
                    }
                  } else {
                    console.log('   🔍 [SIMULATION] Serait supprimé');
                  }

                  console.log('');
                }
              }

              const sizeMb = (totalSize / 1024 / 1024).toFixed(2);

              console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
              console.log('📊 Résumé du nettoyage des artefacts:');
              console.log(`   Artefacts correspondants: ${matchedCount}`);
              console.log(`   Artefacts ${dryRun ? 'à supprimer' : 'supprimés'}: ${dryRun ? matchedCount : deletedCount}`);
              console.log(`   Espace ${dryRun ? 'à libérer' : 'libéré potentiel'}: ${sizeMb} MB`);
              console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');

              core.setOutput('matched', String(matchedCount));
              core.setOutput('deleted', String(dryRun ? matchedCount : deletedCount));
              core.setOutput('size_mb', sizeMb);
            } catch (error) {
              console.error('❌ Erreur lors du nettoyage des artefacts:', error);
              core.setFailed(error.message);
            }

      - name: 🗑️ Clean Old Workflow Runs
        id: clean_runs
        if: ${{ inputs.CLEANUP_TYPE == 'all' || inputs.CLEANUP_TYPE == 'old-runs' }}
        uses: actions/github-script@v7
        with:
          script: |
            const dryRun = '${{ inputs.DRY_RUN }}' === 'true';
            const daysOld = Number('${{ inputs.DAYS_OLD }}');

            console.log('🧹 Nettoyage des anciennes exécutions de workflow...');
            console.log(`Mode: ${dryRun ? '🔍 SIMULATION' : '🗑️ SUPPRESSION RÉELLE'}`);

            try {
              const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
                status: 'completed'
              });

              let matchedCount = 0;
              let deletedCount = 0;

              const cutoffDate = new Date();
              cutoffDate.setDate(cutoffDate.getDate() - daysOld);

              for (const run of runs) {
                const runDate = new Date(run.created_at);
                const isOld = runDate < cutoffDate;
                const isCurrentRun = run.id === context.runId;

                if (isOld && !isCurrentRun) {
                  matchedCount++;

                  console.log(`🏃 Exécution trouvée: ${run.name} (#${run.run_number})`);
                  console.log(`   ID: ${run.id}`);
                  console.log(`   Statut: ${run.conclusion}`);
                  console.log(`   Branche: ${run.head_branch}`);
                  console.log(`   Créé le: ${run.created_at}`);
                  console.log(`   Âge: ${Math.floor((Date.now() - runDate) / (1000 * 60 * 60 * 24))} jours`);
                  console.log(`   URL: ${run.html_url}`);

                  if (!dryRun) {
                    try {
                      await github.rest.actions.deleteWorkflowRun({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        run_id: run.id
                      });
                      console.log('   ✅ Supprimé');
                      deletedCount++;
                    } catch (error) {
                      console.log(`   ❌ Erreur: ${error.message}`);
                    }
                  } else {
                    console.log('   🔍 [SIMULATION] Serait supprimé');
                  }

                  console.log('');
                }
              }

              console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
              console.log('📊 Résumé du nettoyage des exécutions:');
              console.log(`   Exécutions correspondantes: ${matchedCount}`);
              console.log(`   Exécutions ${dryRun ? 'à supprimer' : 'supprimées'}: ${dryRun ? matchedCount : deletedCount}`);
              console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');

              core.setOutput('matched', String(matchedCount));
              core.setOutput('deleted', String(dryRun ? matchedCount : deletedCount));
            } catch (error) {
              console.error('❌ Erreur lors du nettoyage des exécutions:', error);
              core.setFailed(error.message);
            }

      - name: 📊 Cleanup Summary
        if: always()
        shell: bash
        run: |
          set +e

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          # 🧹 Rapport de nettoyage

          ## ⚙️ Configuration

          | Paramètre | Valeur |
          |-----------|--------|
          | **Type de nettoyage** | \`${{ inputs.CLEANUP_TYPE }}\` |
          | **Filtre de configuration** | \`${{ inputs.FILE_FILTER }}\` |
          | **Ancienneté** | \`${{ inputs.DAYS_OLD }} jours\` |
          | **Mode** | ${{ inputs.DRY_RUN == true && '🔍 Simulation' || '🗑️ Suppression réelle' }} |
          | **Date limite** | \`${{ env.CUTOFF_DATE }}\` |

          ## 📊 Résultats

          | Catégorie | Correspondants | Supprimés / simulés | Taille estimée |
          |----------|----------------|---------------------|----------------|
          | Ccache | \`${{ steps.clean_ccache.outputs.matched || 'N/A' }}\` | \`${{ steps.clean_ccache.outputs.deleted || 'N/A' }}\` | \`${{ steps.clean_ccache.outputs.size_mb || 'N/A' }} MB\` |
          | Artefacts | \`${{ steps.clean_artifacts.outputs.matched || 'N/A' }}\` | \`${{ steps.clean_artifacts.outputs.deleted || 'N/A' }}\` | \`${{ steps.clean_artifacts.outputs.size_mb || 'N/A' }} MB\` |
          | Exécutions | \`${{ steps.clean_runs.outputs.matched || 'N/A' }}\` | \`${{ steps.clean_runs.outputs.deleted || 'N/A' }}\` | \`N/A\` |

          ---

          ${{ inputs.DRY_RUN == true && '⚠️ **Mode simulation activé** — aucune suppression effectuée.' || '✅ **Nettoyage terminé.**' }}
          EOF
