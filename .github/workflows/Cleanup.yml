name: Cleanup Cache & Artifacts

on:
  workflow_dispatch:
    inputs:
      CLEANUP_TYPE:
        type: choice
        description: "Cleanup type"
        required: true
        default: all
        options:
          - all
          - caches
          - ccache
          - bazel
          - gki-sources
          - clang-toolchain
          - artifacts
          - old-runs
          - releases

      FILE_FILTER:
        type: choice
        description: "Config / cache filter"
        required: false
        default: all
        options:
          - all
          - android16-6.12-2025-06
          - android16-6.12-2025-09
          - oneplus15
          - oneplus15t
          - oneplus15r
          - ace6t
          - pad3pro
          - pad4
          - ccache
          - bazel
          - gki-sources
          - clang-toolchain

      DAYS_OLD:
        type: number
        description: "Delete items older than X days"
        required: false
        default: 7

      DRY_RUN:
        type: boolean
        description: "Dry run (deletes nothing)"
        required: true
        default: true

permissions:
  actions: write
  contents: write

jobs:
  cleanup:
    name: 🧹 Cleanup ${{ inputs.CLEANUP_TYPE }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 🔍 Analyze Current Cleanup Plan
        id: analyze
        shell: bash
        run: |
          set -euo pipefail

          echo "::group::📊 Cleanup analysis"
          echo "Target filter: ${{ inputs.FILE_FILTER }}"
          echo "Cleanup type: ${{ inputs.CLEANUP_TYPE }}"
          echo "Age: ${{ inputs.DAYS_OLD }} days"
          echo "Dry run: ${{ inputs.DRY_RUN }}"

          CUTOFF_DATE="$(date -u -d "${{ inputs.DAYS_OLD }} days ago" +%Y-%m-%d)"
          echo "CUTOFF_DATE=$CUTOFF_DATE" >> "$GITHUB_ENV"

          echo "::endgroup::"

      - name: 🗑️ Clean Actions Caches
        id: clean_caches
        if: ${{ inputs.CLEANUP_TYPE == 'all' || inputs.CLEANUP_TYPE == 'caches' || inputs.CLEANUP_TYPE == 'ccache' || inputs.CLEANUP_TYPE == 'bazel' || inputs.CLEANUP_TYPE == 'gki-sources' || inputs.CLEANUP_TYPE == 'clang-toolchain' }}
        uses: actions/github-script@v7
        with:
          script: |
            const dryRun = '${{ inputs.DRY_RUN }}' === 'true';
            const fileFilter = '${{ inputs.FILE_FILTER }}';
            const cleanupType = '${{ inputs.CLEANUP_TYPE }}';
            const daysOld = Number('${{ inputs.DAYS_OLD }}');

            console.log('🧹 Cleaning GitHub Actions caches...');
            console.log(`Type: ${cleanupType}`);
            console.log(`Filter: ${fileFilter}`);
            console.log(`Mode: ${dryRun ? '🔍 DRY RUN' : '🗑️ REAL DELETE'}`);

            const cacheTypeMatches = (key) => {
              if (cleanupType === 'all' || cleanupType === 'caches') return true;
              if (cleanupType === 'ccache') return key.includes('ccache');
              if (cleanupType === 'bazel') return key.includes('bazel');
              if (cleanupType === 'gki-sources') return key.includes('gki-sources');
              if (cleanupType === 'clang-toolchain') return key.includes('clang-toolchain');
              return false;
            };

            const filterMatches = (key) => {
              return fileFilter === 'all' || key.includes(fileFilter);
            };

            try {
              const caches = await github.paginate(github.rest.actions.getActionsCacheList, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100
              });

              let matchedCount = 0;
              let deletedCount = 0;
              let totalSize = 0;

              const cutoffDate = new Date();
              cutoffDate.setDate(cutoffDate.getDate() - daysOld);

              for (const cache of caches) {
                const cacheDate = new Date(cache.created_at);
                const isOld = cacheDate < cutoffDate;

                if (cacheTypeMatches(cache.key) && filterMatches(cache.key) && isOld) {
                  matchedCount++;
                  totalSize += cache.size_in_bytes;

                  console.log(`📦 Cache found: ${cache.key}`);
                  console.log(`   ID: ${cache.id}`);
                  console.log(`   Size: ${(cache.size_in_bytes / 1024 / 1024).toFixed(2)} MB`);
                  console.log(`   Created at: ${cache.created_at}`);
                  console.log(`   Last accessed: ${cache.last_accessed_at}`);
                  console.log(`   Age: ${Math.floor((Date.now() - cacheDate) / (1000 * 60 * 60 * 24))} days`);

                  if (!dryRun) {
                    try {
                      await github.rest.actions.deleteActionsCacheById({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        cache_id: cache.id
                      });
                      console.log('   ✅ Deleted');
                      deletedCount++;
                    } catch (error) {
                      console.log(`   ❌ Error: ${error.message}`);
                    }
                  } else {
                    console.log('   🔍 [DRY RUN] Would be deleted');
                  }

                  console.log('');
                }
              }

              const sizeMb = (totalSize / 1024 / 1024).toFixed(2);

              console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
              console.log('📊 Cache cleanup summary:');
              console.log(`   Matching caches: ${matchedCount}`);
              console.log(`   Caches ${dryRun ? 'to delete' : 'deleted'}: ${dryRun ? matchedCount : deletedCount}`);
              console.log(`   Space ${dryRun ? 'to free' : 'potentially freed'}: ${sizeMb} MB`);
              console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');

              core.setOutput('matched', String(matchedCount));
              core.setOutput('deleted', String(dryRun ? matchedCount : deletedCount));
              core.setOutput('size_mb', sizeMb);
            } catch (error) {
              console.error('❌ Error during cache cleanup:', error);
              core.setFailed(error.message);
            }

      - name: 🗑️ Clean Build Artifacts
        id: clean_artifacts
        if: ${{ inputs.CLEANUP_TYPE == 'all' || inputs.CLEANUP_TYPE == 'artifacts' }}
        uses: actions/github-script@v7
        with:
          script: |
            const dryRun = '${{ inputs.DRY_RUN }}' === 'true';
            const daysOld = Number('${{ inputs.DAYS_OLD }}');

            console.log('🧹 Cleaning build artifacts...');
            console.log(`Mode: ${dryRun ? '🔍 DRY RUN' : '🗑️ REAL DELETE'}`);

            try {
              const artifacts = await github.paginate(github.rest.actions.listArtifactsForRepo, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100
              });

              let matchedCount = 0;
              let deletedCount = 0;
              let totalSize = 0;

              const cutoffDate = new Date();
              cutoffDate.setDate(cutoffDate.getDate() - daysOld);

              for (const artifact of artifacts) {
                const artifactDate = new Date(artifact.created_at);
                const isOld = artifactDate < cutoffDate;

                if (isOld) {
                  matchedCount++;
                  totalSize += artifact.size_in_bytes;

                  console.log(`📦 Artifact found: ${artifact.name}`);
                  console.log(`   ID: ${artifact.id}`);
                  console.log(`   Size: ${(artifact.size_in_bytes / 1024 / 1024).toFixed(2)} MB`);
                  console.log(`   Created at: ${artifact.created_at}`);
                  console.log(`   Expires at: ${artifact.expires_at}`);
                  console.log(`   Age: ${Math.floor((Date.now() - artifactDate) / (1000 * 60 * 60 * 24))} days`);

                  if (!dryRun) {
                    try {
                      await github.rest.actions.deleteArtifact({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        artifact_id: artifact.id
                      });
                      console.log('   ✅ Deleted');
                      deletedCount++;
                    } catch (error) {
                      console.log(`   ❌ Error: ${error.message}`);
                    }
                  } else {
                    console.log('   🔍 [DRY RUN] Would be deleted');
                  }

                  console.log('');
                }
              }

              const sizeMb = (totalSize / 1024 / 1024).toFixed(2);

              core.setOutput('matched', String(matchedCount));
              core.setOutput('deleted', String(dryRun ? matchedCount : deletedCount));
              core.setOutput('size_mb', sizeMb);
            } catch (error) {
              console.error('❌ Error during artifact cleanup:', error);
              core.setFailed(error.message);
            }

      - name: 🗑️ Clean Old Workflow Runs
        id: clean_runs
        if: ${{ inputs.CLEANUP_TYPE == 'all' || inputs.CLEANUP_TYPE == 'old-runs' }}
        uses: actions/github-script@v7
        with:
          script: |
            const dryRun = '${{ inputs.DRY_RUN }}' === 'true';
            const daysOld = Number('${{ inputs.DAYS_OLD }}');

            console.log('🧹 Cleaning old workflow runs...');
            console.log(`Mode: ${dryRun ? '🔍 DRY RUN' : '🗑️ REAL DELETE'}`);

            try {
              const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
                status: 'completed'
              });

              let matchedCount = 0;
              let deletedCount = 0;

              const cutoffDate = new Date();
              cutoffDate.setDate(cutoffDate.getDate() - daysOld);

              for (const run of runs) {
                const runDate = new Date(run.created_at);
                const isOld = runDate < cutoffDate;
                const isCurrentRun = run.id === context.runId;

                if (isOld && !isCurrentRun) {
                  matchedCount++;

                  console.log(`🏃 Run found: ${run.name} (#${run.run_number})`);
                  console.log(`   ID: ${run.id}`);
                  console.log(`   Status: ${run.conclusion}`);
                  console.log(`   Branch: ${run.head_branch}`);
                  console.log(`   Created at: ${run.created_at}`);
                  console.log(`   URL: ${run.html_url}`);

                  if (!dryRun) {
                    try {
                      await github.rest.actions.deleteWorkflowRun({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        run_id: run.id
                      });
                      console.log('   ✅ Deleted');
                      deletedCount++;
                    } catch (error) {
                      console.log(`   ❌ Error: ${error.message}`);
                    }
                  } else {
                    console.log('   🔍 [DRY RUN] Would be deleted');
                  }

                  console.log('');
                }
              }

              core.setOutput('matched', String(matchedCount));
              core.setOutput('deleted', String(dryRun ? matchedCount : deletedCount));
            } catch (error) {
              console.error('❌ Error during run cleanup:', error);
              core.setFailed(error.message);
            }

      - name: 🗑️ Clean Old AK3 Releases
        id: clean_releases
        if: ${{ inputs.CLEANUP_TYPE == 'all' || inputs.CLEANUP_TYPE == 'releases' }}
        uses: actions/github-script@v7
        with:
          script: |
            const dryRun = '${{ inputs.DRY_RUN }}' === 'true';
            const daysOld = Number('${{ inputs.DAYS_OLD }}');
            const fileFilter = '${{ inputs.FILE_FILTER }}';

            console.log('🧹 Cleaning old AK3 releases...');
            console.log(`Mode: ${dryRun ? '🔍 DRY RUN' : '🗑️ REAL DELETE'}`);

            try {
              const releases = await github.paginate(github.rest.repos.listReleases, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100
              });

              let matchedCount = 0;
              let deletedCount = 0;

              const cutoffDate = new Date();
              cutoffDate.setDate(cutoffDate.getDate() - daysOld);

              for (const release of releases) {
                const releaseDate = new Date(release.created_at);
                const isOld = releaseDate < cutoffDate;
                const isAk3 = release.tag_name && release.tag_name.startsWith('ak3-');
                const matchesFilter = fileFilter === 'all'
                  || release.tag_name.includes(fileFilter)
                  || release.name.includes(fileFilter);

                if (isOld && isAk3 && matchesFilter) {
                  matchedCount++;

                  console.log(`🏷️ Release found: ${release.tag_name}`);
                  console.log(`   ID: ${release.id}`);
                  console.log(`   Name: ${release.name}`);
                  console.log(`   Created at: ${release.created_at}`);
                  console.log(`   URL: ${release.html_url}`);

                  if (!dryRun) {
                    try {
                      await github.rest.repos.deleteRelease({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        release_id: release.id
                      });

                      try {
                        await github.rest.git.deleteRef({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          ref: `tags/${release.tag_name}`
                        });
                        console.log('   ✅ Release + tag deleted');
                      } catch (tagError) {
                        console.log(`   ⚠️ Release deleted, tag not deleted: ${tagError.message}`);
                      }

                      deletedCount++;
                    } catch (error) {
                      console.log(`   ❌ Error: ${error.message}`);
                    }
                  } else {
                    console.log('   🔍 [DRY RUN] Would be deleted');
                  }

                  console.log('');
                }
              }

              core.setOutput('matched', String(matchedCount));
              core.setOutput('deleted', String(dryRun ? matchedCount : deletedCount));
            } catch (error) {
              console.error('❌ Error during release cleanup:', error);
              core.setFailed(error.message);
            }

      - name: 📊 Cleanup Summary
        if: always()
        shell: bash
        run: |
          set +e

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          # 🧹 Cleanup report

          ## ⚙️ Configuration

          | Setting | Value |
          |-----------|--------|
          | **Cleanup type** | \`${{ inputs.CLEANUP_TYPE }}\` |
          | **Filter** | \`${{ inputs.FILE_FILTER }}\` |
          | **Age** | \`${{ inputs.DAYS_OLD }} days\` |
          | **Mode** | ${{ inputs.DRY_RUN == true && '🔍 Dry run' || '🗑️ Real delete' }} |
          | **Cutoff date** | \`${{ env.CUTOFF_DATE }}\` |

          ## 📊 Results

          | Category | Matching | Deleted / simulated | Estimated size |
          |----------|----------------|---------------------|----------------|
          | Caches | \`${{ steps.clean_caches.outputs.matched || 'N/A' }}\` | \`${{ steps.clean_caches.outputs.deleted || 'N/A' }}\` | \`${{ steps.clean_caches.outputs.size_mb || 'N/A' }} MB\` |
          | Artifacts | \`${{ steps.clean_artifacts.outputs.matched || 'N/A' }}\` | \`${{ steps.clean_artifacts.outputs.deleted || 'N/A' }}\` | \`${{ steps.clean_artifacts.outputs.size_mb || 'N/A' }} MB\` |
          | Runs | \`${{ steps.clean_runs.outputs.matched || 'N/A' }}\` | \`${{ steps.clean_runs.outputs.deleted || 'N/A' }}\` | \`N/A\` |
          | AK3 Releases | \`${{ steps.clean_releases.outputs.matched || 'N/A' }}\` | \`${{ steps.clean_releases.outputs.deleted || 'N/A' }}\` | \`N/A\` |

          ---

          ${{ inputs.DRY_RUN == true && '⚠️ **Dry run enabled** — nothing was deleted.' || '✅ **Cleanup complete.**' }}
          EOF
